---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-runner
  namespace: opengroupware
  labels:
    app: job-runner
    app.kubernetes.io/component: service
    app.kubernetes.io/part-of: opengroupware
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: job-runner
  template:
    metadata:
      labels:
        app: job-runner
        version: "0.1.0"
    spec:
      containers:
        - name: job-runner
          image: ghcr.io/microscaler/opengroupware/job-runner:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["/app/job-runner"]
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: RUST_LOG
              value: "info"
            - name: RUST_BACKTRACE
              value: "0"
            # Control-plane DB (same as admin-api). Non-privileged role: the
            # RLS platform-admin path is via `SET app.is_platform_admin`, not
            # a BYPASSRLS/superuser connection.
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: database
            - name: DATABASE_URL
              value: "postgres://$(DB_USER):$(DB_PASSWORD)@pgbouncer:6432/$(DB_NAME)"
            # sesame-idam integration (ADR-0006 v2). Absent/empty values
            # disable reconciliation (job-runner serves health only).
            - name: SESAME_LOGIN_URL
              value: "http://sesame-idam-login.sesame-idam.svc.cluster.local:8080"
            - name: SESAME_USER_MGMT_URL
              value: "http://sesame-idam-user-mgmt.sesame-idam.svc.cluster.local:8080"
            - name: SESAME_TENANT
              value: "opengroupware"
            - name: SESAME_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: sesame-idam-integration
                  key: client-id
            - name: SESAME_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sesame-idam-integration
                  key: client-secret
            # Reconciliation cadence (see crates/job-runner/src/reconcile.rs).
            - name: RECONCILE_INTERVAL_SECS
              value: "30"
            - name: RECONCILE_BATCH
              value: "50"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: config
              mountPath: /etc/opengroupware
              readOnly: true
            - name: logs
              mountPath: /var/log/opengroupware
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: job-runner-config
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: job-runner
  namespace: opengroupware
  labels:
    app: job-runner
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8082"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    - port: 8082
      targetPort: 8082
      protocol: TCP
      name: http
  selector:
    app: job-runner
