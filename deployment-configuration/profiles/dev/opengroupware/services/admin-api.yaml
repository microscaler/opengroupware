---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-api
  namespace: opengroupware
  labels:
    app: admin-api
    app.kubernetes.io/component: service
    app.kubernetes.io/part-of: opengroupware
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: admin-api
  template:
    metadata:
      labels:
        app: admin-api
        version: "0.1.0"
    spec:
      containers:
        - name: admin-api
          image: ghcr.io/microscaler/opengroupware/admin-api:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["/app/admin-api"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: RUST_LOG
              value: "info"
            - name: RUST_BACKTRACE
              value: "0"
            # DATABASE_URL composed via k8s dependent-env expansion. The
            # service role must NOT be privileged: admin-api refuses to
            # start on superuser/BYPASSRLS connections (RLS guard).
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: database
            - name: DATABASE_URL
              value: "postgres://$(DB_USER):$(DB_PASSWORD)@pgbouncer:6432/$(DB_NAME)"
            # sesame-idam integration (ADR-0006 v2). Absent/empty values
            # disable provisioning (accounts stay pending_provisioning).
            - name: SESAME_LOGIN_URL
              value: "http://sesame-idam-login.sesame-idam.svc.cluster.local:8080"
            - name: SESAME_USER_MGMT_URL
              value: "http://sesame-idam-user-mgmt.sesame-idam.svc.cluster.local:8080"
            - name: SESAME_TENANT
              value: "opengroupware"
            - name: SESAME_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: sesame-idam-integration
                  key: client-id
            - name: SESAME_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sesame-idam-integration
                  key: client-secret
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          volumeMounts:
            - name: config
              mountPath: /etc/opengroupware
              readOnly: true
            - name: logs
              mountPath: /var/log/opengroupware
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: admin-api-config
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: admin-api
  namespace: opengroupware
  labels:
    app: admin-api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: admin-api
