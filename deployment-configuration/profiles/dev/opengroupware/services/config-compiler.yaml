---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-compiler
  namespace: opengroupware
  labels:
    app: config-compiler
    app.kubernetes.io/component: service
    app.kubernetes.io/part-of: opengroupware
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: config-compiler
  template:
    metadata:
      labels:
        app: config-compiler
        version: "0.1.0"
    spec:
      containers:
        - name: config-compiler
          image: ghcr.io/microscaler/opengroupware/config-compiler:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["/app/config-compiler"]
          ports:
            - name: http
              containerPort: 8083
              protocol: TCP
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: RUST_LOG
              value: "info"
            - name: RUST_BACKTRACE
              value: "0"
            # Control-plane DB (same as admin-api). Reads desired state via the
            # RLS platform-admin path (SET app.is_platform_admin), non-superuser.
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: database
            - name: DATABASE_URL
              value: "postgres://$(DB_USER):$(DB_PASSWORD)@pgbouncer:6432/$(DB_NAME)"
            # Rendered Rspamd settings land on a writable volume the Rspamd
            # deployment will mount (read-only) once it exists.
            - name: RSPAMD_SETTINGS_PATH
              value: "/var/lib/opengroupware/rspamd/settings.conf"
            - name: RENDER_INTERVAL_SECS
              value: "60"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: config
              mountPath: /etc/opengroupware
              readOnly: true
            - name: rspamd-out
              mountPath: /var/lib/opengroupware/rspamd
            - name: logs
              mountPath: /var/log/opengroupware
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: config-compiler-config
        - name: rspamd-out
          emptyDir: {}
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: config-compiler
  namespace: opengroupware
  labels:
    app: config-compiler
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8083"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    - port: 8083
      targetPort: 8083
      protocol: TCP
      name: http
  selector:
    app: config-compiler
