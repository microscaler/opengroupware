---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: abuse-api
  namespace: opengroupware
  labels:
    app: abuse-api
    app.kubernetes.io/component: service
    app.kubernetes.io/part-of: opengroupware
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: abuse-api
  template:
    metadata:
      labels:
        app: abuse-api
        version: "0.1.0"
    spec:
      containers:
        - name: abuse-api
          image: ghcr.io/microscaler/opengroupware/abuse-api:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["/app/abuse-api"]
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: RUST_LOG
              value: "info"
            - name: RUST_BACKTRACE
              value: "0"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "150m"
          volumeMounts:
            - name: config
              mountPath: /etc/opengroupware
              readOnly: true
            - name: logs
              mountPath: /var/log/opengroupware
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: abuse-api-config
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: abuse-api
  namespace: opengroupware
  labels:
    app: abuse-api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
      name: http
  selector:
    app: abuse-api
