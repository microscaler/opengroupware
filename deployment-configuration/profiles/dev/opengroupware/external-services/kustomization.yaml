apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Data layer (deploy first)
  - postgresql.yaml
  - redis.yaml
  - pgbouncer.yaml
  - minio.yaml

  # Mail stack
  - stalwart-config.yaml
  - stalwart.yaml
  - rspamd.yaml
  - clamav.yaml

  # Identity: sesame-idam (in-house, ADR-0006 v2) is deployed from its own
  # repo's helm charts, not from this profile. authentik.yaml / lldap.yaml
  # removed per ADR-0006 v2. Search removed per D5 (Stalwart built-in FTS).

  # Observability
  - prometheus.yaml
  - grafana.yaml
  - loki.yaml
  - otel.yaml

  # Backup
  - pgbackrest.yaml
  - restic.yaml
