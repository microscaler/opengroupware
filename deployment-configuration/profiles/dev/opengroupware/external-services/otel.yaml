---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
  namespace: opengroupware
  labels:
    app: otel-collector
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: opengroupware
spec:
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: docker.io/otel/opentelemetry-collector-contrib:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 4317
            - name: http
              containerPort: 4318
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: opengroupware
spec:
  type: ClusterIP
  ports:
    - port: 4317
      targetPort: 4317
      name: grpc
    - port: 4318
      targetPort: 4318
      name: http
  selector:
    app: otel-collector
