---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clamav
  namespace: opengroupware
  labels:
    app: clamav
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: opengroupware
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clamav
  template:
    metadata:
      labels:
        app: clamav
    spec:
      containers:
        - name: clamav
          image: docker.io/clamav/clamav:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: clamd
              containerPort: 3310
          livenessProbe:
            tcpSocket:
              port: 3310
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 3310
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: clamav
  namespace: opengroupware
spec:
  type: ClusterIP
  ports:
    - port: 3310
      targetPort: 3310
      name: clamd
  selector:
    app: clamav
