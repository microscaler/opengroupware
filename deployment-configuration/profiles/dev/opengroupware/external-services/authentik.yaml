---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik
  namespace: opengroupware
  labels:
    app: authentik
    app.kubernetes.io/component: identity
    app.kubernetes.io/part-of: opengroupware
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authentik
  template:
    metadata:
      labels:
        app: authentik
    spec:
      containers:
        - name: authentik
          image: ghcr.io/goauthentik/server:2024
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9000
            - name: https
              containerPort: 9443
          env:
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secret-key
                  key: secret-key
            - name: AUTHENTIK_POSTGRESQL_HOST
              value: postgresql
            - name: AUTHENTIK_POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: username
            - name: AUTHENTIK_POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: password
            - name: AUTHENTIK_POSTGRESQL_NAME
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: database
          livenessProbe:
            httpGet:
              path: /
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: authentik
  namespace: opengroupware
spec:
  type: ClusterIP
  ports:
    - port: 9000
      targetPort: 9000
      name: http
    - port: 9443
      targetPort: 9443
      name: https
  selector:
    app: authentik
