---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rspamd
  namespace: opengroupware
  labels:
    app: rspamd
    app.kubernetes.io/component: abuse
    app.kubernetes.io/part-of: opengroupware
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rspamd
  template:
    metadata:
      labels:
        app: rspamd
    spec:
      containers:
        - name: rspamd
          image: docker.io/rspamd/rspamd:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 11334
            - name: milter
              containerPort: 11332
          env:
            - name: RSPAMD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rspamd-credentials
                  key: password
          livenessProbe:
            httpGet:
              path: /helo
              port: 11334
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /helo
              port: 11334
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: rspamd
  namespace: opengroupware
spec:
  type: ClusterIP
  ports:
    - port: 11334
      targetPort: 11334
      name: http
    - port: 11332
      targetPort: 11332
      name: milter
  selector:
    app: rspamd
