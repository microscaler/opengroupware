---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stalwart-mail
  namespace: opengroupware
  labels:
    app: stalwart-mail
    app.kubernetes.io/component: mailbox
    app.kubernetes.io/part-of: opengroupware
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: stalwart-mail
  template:
    metadata:
      labels:
        app: stalwart-mail
    spec:
      containers:
        - name: stalwart-mail
          # ADR-0007: official image (the ghcr.io/stalwart-mail ref was
          # fictional), pinned to the version whose config schema is verified.
          image: docker.io/stalwartlabs/stalwart:v0.16.13
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
            - name: imap
              containerPort: 143
            - name: smtp
              containerPort: 25
            - name: submission
              containerPort: 587
          # 0.16: --config reads ONLY the bootstrap data-store spec (JSON).
          # Listeners + the sesame directory are applied post-boot by the
          # stalwart-configure Job (ADR-0007).
          args: ["--config", "/opt/stalwart/etc/config.json"]
          volumeMounts:
            - name: bootstrap
              mountPath: /opt/stalwart/etc
          env:
            # Consumed by the %{env:STALWART_DB_PASSWORD}% macro in the
            # bootstrap config. Stalwart's own DB (mail-plane, ADR-0005).
            - name: STALWART_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stalwart-db-credentials
                  key: password
          # TCP probes on the IMAP port — robust across Stalwart versions
          # without assuming an HTTP health path.
          livenessProbe:
            tcpSocket:
              port: 143
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 143
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
      volumes:
        - name: bootstrap
          configMap:
            name: stalwart-bootstrap
---
apiVersion: v1
kind: Service
metadata:
  name: stalwart-mail
  namespace: opengroupware
spec:
  type: ClusterIP
  ports:
    # JMAP/CalDAV/CardDAV/WebDAV + management all served over http (8080).
    - port: 8080
      targetPort: 8080
      name: http
    - port: 143
      targetPort: 143
      name: imap
    - port: 25
      targetPort: 25
      name: smtp
    - port: 587
      targetPort: 587
      name: submission
  selector:
    app: stalwart-mail
