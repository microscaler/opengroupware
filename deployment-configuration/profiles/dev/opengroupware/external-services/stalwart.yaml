---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stalwart-mail
  namespace: opengroupware
  labels:
    app: stalwart-mail
    app.kubernetes.io/component: mailbox
    app.kubernetes.io/part-of: opengroupware
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: stalwart-mail
  template:
    metadata:
      labels:
        app: stalwart-mail
    spec:
      containers:
        - name: stalwart-mail
          image: ghcr.io/stalwart-mail/stalwart-mail:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
            - name: imap
              containerPort: 143
            - name: smtp
              containerPort: 25
            - name: jmap
              containerPort: 8081
          args: ["--config", "/opt/stalwart/etc/config.toml"]
          volumeMounts:
            - name: config
              mountPath: /opt/stalwart/etc
          # Env consumed via %{env:...}% macros in config.toml — the
          # previous STALWART_* vars were fictional (Stalwart ignores env
          # without config macros). See stalwart-config.yaml.
          env:
            - name: STALWART_DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: username
            - name: STALWART_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: password
            - name: STALWART_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: database
            - name: STALWART_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: access-key
            - name: STALWART_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secret-key
            - name: STALWART_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stalwart-admin-credentials
                  key: password
            # sesame rp_directory bridge (F3) — SELECT-only role in the
            # sesame database. Secret added per environment via sops edit.
            - name: SESAME_DB_HOST
              value: "sesame-idam-postgres.sesame-idam.svc.cluster.local"
            - name: SESAME_DB_NAME
              value: "sesame"
            - name: RP_STALWART_USER
              valueFrom:
                secretKeyRef:
                  name: rp-stalwart-credentials
                  key: username
            - name: RP_STALWART_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rp-stalwart-credentials
                  key: password
          livenessProbe:
            httpGet:
              path: /admin
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /admin
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
      volumes:
        - name: config
          configMap:
            name: stalwart-config
---
apiVersion: v1
kind: Service
metadata:
  name: stalwart-mail
  namespace: opengroupware
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: http
    - port: 143
      targetPort: 143
      name: imap
    - port: 25
      targetPort: 25
      name: smtp
    - port: 8081
      targetPort: 8081
      name: jmap
  selector:
    app: stalwart-mail
