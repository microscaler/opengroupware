---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pgbackrest
  namespace: opengroupware
  labels:
    app: pgbackrest
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: opengroupware
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pgbackrest
              image: docker.io/dimfeld/pgbackrest:latest
              env:
                - name: PGBACKREST_REPO1_S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: minio-credentials
                      key: bucket
                - name: PGBACKREST_REPO1_S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: minio-credentials
                      key: endpoint
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"
