---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: restic
  namespace: opengroupware
  labels:
    app: restic
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: opengroupware
spec:
  schedule: "30 2 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: restic
              image: docker.io/restic/restic:latest
              env:
                - name: RESTIC_REPOSITORY
                  valueFrom:
                    secretKeyRef:
                      name: restic-repository
                      key: repository
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: restic-repository
                      key: password
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"
