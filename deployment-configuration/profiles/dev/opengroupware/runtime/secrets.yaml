# Secrets for the dev profile.
#
# COMMIT RULE: this file must NEVER be committed unencrypted. Run
# scripts/secrets-bootstrap.sh to generate real values and encrypt with sops
# (age). The pre-commit hook rejects any Kubernetes Secret containing
# plaintext stringData in deployment-configuration/.
#
# Every secret name below is referenced by a secretKeyRef somewhere in the
# dev profile. The previous version of this file defined three secrets
# (opengroupware-database-credentials, opengroupware-jwt-secret,
# opengroupware-rspamd-key) whose names matched NO consumer; the ones below
# are what the manifests actually reference, plus app-level secrets for
# the product services.
#
# __GENERATE__ markers are replaced with random values by the bootstrap
# script before encryption.
---
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-credentials
  namespace: opengroupware
  labels:
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: opengroupware
type: Opaque
stringData:
  username: opengroupware
  password: __GENERATE__
  database: opengroupware
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-password
  namespace: opengroupware
  labels:
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: opengroupware
type: Opaque
stringData:
  password: __GENERATE__
---
apiVersion: v1
kind: Secret
metadata:
  name: rspamd-credentials
  namespace: opengroupware
  labels:
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: opengroupware
type: Opaque
stringData:
  password: __GENERATE__
---
apiVersion: v1
kind: Secret
metadata:
  name: stalwart-admin-credentials
  namespace: opengroupware
  labels:
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: opengroupware
type: Opaque
stringData:
  password: __GENERATE__
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: opengroupware
  labels:
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: opengroupware
type: Opaque
stringData:
  access-key: opengroupware
  secret-key: __GENERATE__
---
# Identity secrets (sesame-idam, ADR-0006 v2): sesame-idam manages its own
# credentials via its own helm charts/migrations. Only the shared trust
# anchor between opengroupware services and sesame-idam lives here.
apiVersion: v1
kind: Secret
metadata:
  name: sesame-idam-integration
  namespace: opengroupware
  labels:
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: opengroupware
type: Opaque
stringData:
  # Client credentials for opengroupware admin-api -> sesame-idam
  client-id: opengroupware-admin-api
  client-secret: __GENERATE__
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-credentials
  namespace: opengroupware
  labels:
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: opengroupware
type: Opaque
stringData:
  admin-user: admin
  admin-password: __GENERATE__
---
apiVersion: v1
kind: Secret
metadata:
  name: restic-repository
  namespace: opengroupware
  labels:
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: opengroupware
type: Opaque
stringData:
  repository: s3:http://minio:9000/opengroupware-backups
  password: __GENERATE__
---
# Product-service secrets (consumed by admin-api/abuse-api once wired —
# helm values must reference these instead of carrying inline CHANGE_ME).
apiVersion: v1
kind: Secret
metadata:
  name: opengroupware-app-secrets
  namespace: opengroupware
  labels:
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: opengroupware
type: Opaque
stringData:
  jwt-secret: __GENERATE__
  api-internal-token: __GENERATE__
