{{- if and .Values.external .Values.external.authentik .Values.external.authentik.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik
  namespace: {{ .Values.deployment.namespace | default "opengroupware" }}
  labels:
    app: authentik
    app.kubernetes.io/component: identity
    app.kubernetes.io/part-of: opengroupware
    {{- include "opengroupware.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.external.authentik.replicas | default 1 }}
  selector:
    matchLabels:
      app: authentik
  template:
    metadata:
      labels:
        app: authentik
        {{- include "opengroupware.labels" . | nindent 8 }}
    spec:
      containers:
        - name: authentik
          image: {{ .Values.external.authentik.image | default "ghcr.io/goauthentik/server:2024" }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ .Values.external.authentik.httpPort | default 9000 }}
              protocol: TCP
            - name: https
              containerPort: {{ .Values.external.authentik.httpsPort | default 9443 }}
              protocol: TCP
          env:
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secret-key
                  key: secret-key
            - name: AUTHENTIK_POSTGRESQL_HOST
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: host
            - name: AUTHENTIK_POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: username
            - name: AUTHENTIK_POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: password
            - name: AUTHENTIK_POSTGRESQL_NAME
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: database
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              memory: {{ .Values.external.authentik.resources.requests.memory | default "512Mi" }}
              cpu: {{ .Values.external.authentik.resources.requests.cpu | default "200m" }}
            limits:
              memory: {{ .Values.external.authentik.resources.limits.memory | default "1Gi" }}
              cpu: {{ .Values.external.authentik.resources.limits.cpu | default "500m" }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: authentik-data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.external.authentik.persistence.storageClassName | default "standard" | quote }}
        resources:
          requests:
            storage: {{ .Values.external.authentik.persistence.size | default "10Gi" }}
---
apiVersion: v1
kind: Service
metadata:
  name: authentik
  namespace: {{ .Values.deployment.namespace | default "opengroupware" }}
  labels:
    app: authentik
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.external.authentik.httpPort | default 9000 }}
      targetPort: {{ .Values.external.authentik.httpPort | default 9000 }}
      protocol: TCP
      name: http
    - port: {{ .Values.external.authentik.httpsPort | default 9443 }}
      targetPort: {{ .Values.external.authentik.httpsPort | default 9443 }}
      protocol: TCP
      name: https
  selector:
    app: authentik
{{- end }}
