{{- if and .Values.external .Values.external.loki .Values.external.loki.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki
  namespace: {{ .Values.deployment.namespace | default "opengroupware" }}
  labels:
    app: loki
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: opengroupware
    {{- include "opengroupware.labels" . | nindent 4 }}
spec:
  serviceName: loki-headless
  replicas: {{ .Values.external.loki.replicas | default 1 }}
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
        {{- include "opengroupware.labels" . | nindent 8 }}
    spec:
      containers:
        - name: loki
          image: {{ .Values.external.loki.image | default "docker.io/grafana/loki:latest" }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ .Values.external.loki.port | default 3100 }}
              protocol: TCP
          args:
            - --config.file=/etc/loki/local-config.yaml
          resources:
            requests:
              memory: {{ .Values.external.loki.resources.requests.memory | default "256Mi" }}
              cpu: {{ .Values.external.loki.resources.requests.cpu | default "100m" }}
            limits:
              memory: {{ .Values.external.loki.resources.limits.memory | default "512Mi" }}
              cpu: {{ .Values.external.loki.resources.limits.cpu | default "500m" }}
          volumeMounts:
            - name: data
              mountPath: /loki
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: loki-data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.external.loki.persistence.storageClassName | default "standard" | quote }}
        resources:
          requests:
            storage: {{ .Values.external.loki.persistence.size | default "50Gi" }}
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: {{ .Values.deployment.namespace | default "opengroupware" }}
  labels:
    app: loki
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.external.loki.port | default 3100 }}
      targetPort: {{ .Values.external.loki.port | default 3100 }}
      protocol: TCP
      name: http
  selector:
    app: loki
{{- end }}
