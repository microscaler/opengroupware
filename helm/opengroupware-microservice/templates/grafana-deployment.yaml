{{- if and .Values.external .Values.external.grafana .Values.external.grafana.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: {{ .Values.deployment.namespace | default "opengroupware" }}
  labels:
    app: grafana
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: opengroupware
    {{- include "opengroupware.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.external.grafana.replicas | default 1 }}
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
        {{- include "opengroupware.labels" . | nindent 8 }}
    spec:
      containers:
        - name: grafana
          image: {{ .Values.external.grafana.image | default "docker.io/grafana/grafana:latest" }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ .Values.external.grafana.port | default 3000 }}
              protocol: TCP
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-credentials
                  key: username
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-credentials
                  key: password
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              memory: {{ .Values.external.grafana.resources.requests.memory | default "128Mi" }}
              cpu: {{ .Values.external.grafana.resources.requests.cpu | default "50m" }}
            limits:
              memory: {{ .Values.external.grafana.resources.limits.memory | default "256Mi" }}
              cpu: {{ .Values.external.grafana.resources.limits.cpu | default "200m" }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.external.grafana.persistence.storageClassName | default "standard" | quote }}
        resources:
          requests:
            storage: {{ .Values.external.grafana.persistence.size | default "10Gi" }}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: {{ .Values.deployment.namespace | default "opengroupware" }}
  labels:
    app: grafana
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.external.grafana.port | default 3000 }}
      targetPort: {{ .Values.external.grafana.port | default 3000 }}
      protocol: TCP
      name: http
  selector:
    app: grafana
{{- end }}
