service:
  name: config-compiler
  port: 8083
  containerPort: 8083
image:
  name: config-compiler
  repository: ghcr.io/microscaler/opengroupware
app:
  binaryName: config-compiler
  serviceName: config-compiler
deployment:
  replicas: 1
resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m
config:
  database:
    host: postgres-primary
    port: 5432
    database: opengroupware
    max_connections: 10
  stalwart:
    admin_api: http://admin-api:8080
env:
  RUST_LOG: info
  RUST_BACKTRACE: '0'
serviceType: ClusterIP
healthCheck:
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 2
prometheus:
  enabled: true
  port: 9090
  path: /metrics
extraEnv: []
