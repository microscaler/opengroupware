service:
  name: admin-console
  port: 3001
  containerPort: 3001
image:
  name: admin-console
  repository: ghcr.io/microscaler/opengroupware
app:
  binaryName: admin-console
  serviceName: admin-console
deployment:
  replicas: 1
resources:
  requests:
    memory: 128Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: 200m
config:
  leptos:
    site_addr: 0.0.0.0:3001
  admin_api:
    endpoint: http://admin-api:8080
env:
  RUST_LOG: info
  RUST_BACKTRACE: '0'
serviceType: ClusterIP
healthCheck:
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 2
prometheus:
  enabled: true
  port: 9090
  path: /metrics
extraEnv: []
