service:
  name: abuse-api
  port: 8081
  containerPort: 8081
image:
  name: abuse-api
  repository: ghcr.io/microscaler/opengroupware
app:
  binaryName: abuse-api
  serviceName: abuse-api
deployment:
  replicas: 1
resources:
  requests:
    memory: 128Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: 150m
config:
  database:
    host: postgres-primary
    port: 5432
    database: opengroupware
    max_connections: 10
  redis:
    host: redis
    port: 6379
    max_connections: 10
  rspamd:
    host: rspamd
    port: 11334
    password: CHANGE_ME
env:
  RUST_LOG: info
  RUST_BACKTRACE: '0'
serviceType: ClusterIP
healthCheck:
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 2
prometheus:
  enabled: true
  port: 9090
  path: /metrics
extraEnv: []
