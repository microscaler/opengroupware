# admin-api control-plane deployment for shared-k8s, self-contained with a
# dedicated Postgres (the shared postgres-ha is fronted by pgpool, whose
# pool_passwd doesn't know ad-hoc roles; opengroupware owning its own data
# store also matches ADR-0005 intent). Direct-apply bootstrap, not GitOps.
#
# SECRETS: all DB passwords come from the `og-db-credentials` Secret, which
# scripts/deploy-shared-k8s.sh (step `secret`) generates with random values
# and is NOT committed. No plaintext credentials in this file.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: og-postgres
  namespace: opengroupware
  labels: { app: og-postgres, app.kubernetes.io/part-of: opengroupware }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: og-postgres } }
  template:
    metadata:
      labels: { app: og-postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - { name: POSTGRES_DB, value: opengroupware }
            - { name: POSTGRES_USER, value: postgres }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: og-db-credentials, key: superuser-password } }
            - name: OG_APP_PASSWORD
              valueFrom: { secretKeyRef: { name: og-db-credentials, key: app-password } }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          ports: [{ containerPort: 5432, name: pg }]
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
            - { name: init, mountPath: /docker-entrypoint-initdb.d }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "postgres"] }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { memory: 128Mi, cpu: 100m }
            limits: { memory: 512Mi, cpu: 500m }
      volumes:
        - name: data
          emptyDir: {}          # dev bootstrap; PVC for anything persistent
        - name: init
          configMap: { name: og-postgres-init }
---
# initdb script reads OG_APP_PASSWORD from env (injected from the secret) —
# no password literal in the manifest.
apiVersion: v1
kind: ConfigMap
metadata:
  name: og-postgres-init
  namespace: opengroupware
data:
  init.sh: |
    #!/bin/bash
    set -e
    psql -v ON_ERROR_STOP=1 -U postgres -d opengroupware <<SQL
    CREATE ROLE og_app LOGIN PASSWORD '${OG_APP_PASSWORD}';
    SQL
---
apiVersion: v1
kind: Service
metadata:
  name: og-postgres
  namespace: opengroupware
spec:
  selector: { app: og-postgres }
  ports: [{ port: 5432, targetPort: pg }]
---
apiVersion: batch/v1
kind: Job
metadata:
  name: og-migrate
  namespace: opengroupware
  labels: { app.kubernetes.io/part-of: opengroupware }
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-pg
          image: postgres:16
          command: ["sh", "-c", "until pg_isready -h og-postgres -U postgres; do sleep 2; done"]
      containers:
        - name: migrate
          image: 10.177.76.220:5000/opengroupware/admin-api:dev-2
          command: ["/app/admin-api"]
          env:
            - { name: RUST_LOG, value: info }
            - { name: MIGRATE_ONLY, value: "1" }
            - { name: OPENGROUPWARE_ALLOW_UNSAFE_DB, value: "1" }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: og-db-credentials, key: superuser-password } }
            - name: DATABASE_URL
              value: "postgres://postgres:$(DB_PASSWORD)@og-postgres:5432/opengroupware"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-api
  namespace: opengroupware
  labels: { app: admin-api, app.kubernetes.io/part-of: opengroupware }
spec:
  replicas: 1
  selector: { matchLabels: { app: admin-api } }
  template:
    metadata:
      labels: { app: admin-api }
    spec:
      containers:
        - name: admin-api
          image: 10.177.76.220:5000/opengroupware/admin-api:dev-4
          command: ["/app/admin-api"]
          ports: [{ name: http, containerPort: 8080 }]
          env:
            - { name: RUST_LOG, value: info }
            # Restricted app role — RLS guard refuses privileged connections.
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: og-db-credentials, key: app-password } }
            - name: DATABASE_URL
              value: "postgres://og_app:$(DB_PASSWORD)@og-postgres:5432/opengroupware"
            # sesame token verification (PRD F4) — enforcement ON. A valid
            # Bearer from sesame is required; unauthenticated → 401.
            # sesame serves JWKS under the /idam/v1 prefix (confirmed live +
            # matches loadlinker's config), NOT the bare /.well-known path.
            - name: OG_AUTH_JWKS_URL
              value: "http://identity-session-service.sesame-idam.svc.cluster.local:8080/idam/v1/.well-known/jwks.json"
            - name: OG_AUTH_ISSUER
              value: "https://idam.example.com"
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests: { memory: 64Mi, cpu: 50m }
            limits: { memory: 256Mi, cpu: 500m }
---
apiVersion: v1
kind: Service
metadata:
  name: admin-api
  namespace: opengroupware
  labels: { app: admin-api }
spec:
  selector: { app: admin-api }
  ports: [{ port: 8080, targetPort: http, name: http }]
